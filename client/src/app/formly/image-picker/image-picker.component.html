<div class="space-y-3">
  <input type="text" class="form-control" [value]="this.formControl.value" name="url-{{this.id}}" placeholder="URL of Selected File" readonly>
  <button class="btn-primary" type="button" (click)="openFileSelector()">
    <app-icon icon="folder-open" />
    Select File
  </button>

  @if (this.formControl.value) {
    <div class="flex justify-center">
      <img [src]="this.formControl.value" alt="Hero Image Preview" class="max-h-48 object-contain border border-gray-300 rounded">
    </div>
  }
</div>
