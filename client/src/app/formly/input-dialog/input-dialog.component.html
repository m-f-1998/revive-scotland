<div class="modal-header">
  <h4 class="modal-title">{{title}}</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
</div>

<div class="modal-body">
  @if (body) {
    <p class="text-sm text-gray-600 mb-4" [innerHTML]="body"></p>
  }
  <formly-form [form]="this.form" [model]="this.model" [fields]="this.fields" />
  @if (description) {
    <p class="text-sm text-gray-500 mt-2" [innerHTML]="description"></p>
  }
</div>

<div class="modal-footer">
  <button type="submit" class="btn-primary" (click)="confirm()" [disabled]="this.form.invalid">
    <app-icon icon="save" />
    {{confirmText}}
  </button>
</div>
