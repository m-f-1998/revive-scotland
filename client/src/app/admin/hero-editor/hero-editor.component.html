<app-admin-navbar />
<div class="max-w-screen-xl mx-auto p-4 md:p-8" style="min-height: 80vh;">
  <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
    <app-icon icon="image" />
    Page Banners
  </h2>
  <formly-form [form]="form" [model]="model" [fields]="fields" />
  <p class="text-gray-500 text-sm mb-4">Configure up to {{ maxHeroes }} banner images for this page, including optional titles and descriptions.</p>
  <hr class="border-gray-200 mb-6">

  @if (loading()) {
    <div class="flex flex-col items-center justify-center gap-2 p-10 text-gray-500">
      <app-icon icon="spinner" iconAnimation="spin" iconSize="2x" />
      <p class="mt-2">Loading data...</p>
    </div>
  } @else {
    <div>
      @for (hero of heroData(); track $index) {
        <div class="card mb-4 shadow-sm">
          <div class="card-header flex justify-between items-center">
            <h5 class="mb-0 font-semibold">Banner {{ $index + 1 }}</h5>
            <button class="btn-danger btn-sm" (click)="removeHero(hero.id)">
              <app-icon icon="trash" /> Remove
            </button>
          </div>
          <div class="card-body">
            <formly-form [form]="hero.form" [model]="hero.model" [fields]="hero.fields" />
          </div>
        </div>
      }

      <div class="flex justify-between mt-6">
        <button class="btn-success" (click)="addNewHero()" [disabled]="heroData().length >= maxHeroes">
          <app-icon icon="plus-circle" /> Add Banner ({{ heroData().length }}/{{ maxHeroes }})
        </button>
        @if (heroData().length > 0) {
          <button class="btn-primary" (click)="saveHeroData()" [disabled]="loading()">
            <app-icon icon="save" /> Save Changes
          </button>
        }
      </div>
    </div>
  }
</div>
<app-admin-footer />
