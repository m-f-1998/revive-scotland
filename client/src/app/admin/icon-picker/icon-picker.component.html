<div class="relative w-full" (click)="stopProp($event)">
  <button
    type="button"
    class="flex items-center gap-2 w-full border border-gray-300 dark:border-slate-600 rounded px-3 py-2 text-sm bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
    (click)="toggle($event)"
  >
    @if (value()) {
      <app-icon [icon]="$any(value())" />
      <span class="flex-1 text-left">{{ value() }}</span>
    } @else {
      <span class="flex-1 text-left text-gray-400">Select an icon...</span>
    }
    <span class="inline-block transition-transform duration-200" [class.rotate-180]="isOpen()">
      <app-icon icon="chevron-down" />
    </span>
  </button>

  @if (isOpen()) {
    <div class="absolute z-50 left-0 right-0 mt-1 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-lg shadow-xl">
      <div class="p-2 border-b border-gray-200 dark:border-slate-600">
        <input
          type="text"
          class="w-full border border-gray-300 dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-primary"
          placeholder="Search icons..."
          [value]="searchQuery()"
          (input)="onSearchInput($event)"
          (click)="stopProp($event)"
        />
      </div>
      <div class="overflow-y-scroll max-h-56 p-2" style="scrollbar-gutter: stable">
        @if (filteredIcons().length === 0) {
          <p class="text-center text-sm text-gray-400 py-4">No icons found.</p>
        } @else {
          <div class="grid grid-cols-6 gap-1">
            @for (icon of filteredIcons(); track icon) {
              <button
                type="button"
                class="flex flex-col items-center gap-0.5 p-1.5 rounded focus:outline-none transition-colors"
                [class]="icon === value() ? 'bg-primary text-white' : 'hover:bg-gray-100 dark:hover:bg-slate-700'"
                [title]="icon"
                (click)="selectIcon(icon, $event)"
              >
                <app-icon [icon]="$any(icon)" />
                <span class="truncate w-full text-center leading-tight" style="font-size: 9px;">{{ icon }}</span>
              </button>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
