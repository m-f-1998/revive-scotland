<app-admin-navbar />
<div class="max-w-screen-xl mx-auto p-4 md:p-8" style="min-height: 80vh;">
  <h2 class="text-2xl font-bold mb-2 flex items-center gap-2">
    <app-icon icon="address-card" />
    Contact Details
  </h2>
  <p class="text-gray-500 text-sm mb-4">Edit the phone number, email address and Instagram handle shown in the Contact section of the website.</p>
  <hr class="border-gray-200 mb-6">

  @if (loading()) {
    <div class="flex flex-col items-center justify-center gap-2 p-10 text-gray-500">
      <app-icon icon="spinner" iconAnimation="spin" iconSize="2x" />
      <p class="mt-2">Loading...</p>
    </div>
  } @else {
    <div class="card shadow-sm max-w-xl">
      <div class="card-body">
        <formly-form [form]="form" [model]="model" [fields]="fields" />
      </div>
      <div class="card-footer flex justify-end">
        <button class="btn-primary" (click)="save()" [disabled]="loading() || form.invalid">
          <app-icon icon="save" /> Save Changes
        </button>
      </div>
    </div>
  }
</div>
<app-admin-footer />
