<app-navbar />
<div class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center bg-gray-900 overflow-hidden">
  <div class="absolute inset-0 bg-black/50 z-0"></div>
  <div class="relative z-10 text-center text-white px-4 max-w-2xl w-full">
    <div class="flex justify-center mb-8">
      <a href="/" class="relative">
        <span class="absolute inset-0 rounded-full border-4 border-primary/60 animate-ping opacity-75"></span>
        <img [attr.src]="'/api/img/' + imagePath + '?w=640&f=webp'"
          [attr.srcset]="
            '/api/img/' + imagePath + '?w=320&f=webp 320w, ' +
            '/api/img/' + imagePath + '?w=640&f=webp 640w, ' +
            '/api/img/' + imagePath + '?w=1024&f=webp 1024w'
          "
          sizes="(max-width: 600px) 100vw, 600px"
          alt="Error Image"
          loading="lazy"
          decoding="async"
          class="relative w-40 h-40 rounded-full object-cover border-4 border-transparent z-10"
        />
      </a>
    </div>
    <h2 class="text-3xl font-bold mb-3">{{error}}</h2>
    <p class="text-gray-300 mb-8">{{description}}</p>
    <div class="flex justify-center">
      <a href="/" class="btn-primary px-8 py-3 rounded text-base" title="Home">
        <app-icon icon="home" />
        Go Home
      </a>
    </div>
  </div>
</div>
