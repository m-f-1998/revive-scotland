<div class="max-w-screen-xl mx-auto px-4 py-16 text-center" id="about">
  <header class="mb-12">
    <p class="text-serif mb-0 text-primary">About Us</p>
    <h2 class="uppercase tracking-wider">Who Are We?</h2>
  </header>
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    @for (card of cards(); track $index) {
      <div>
        <div class="text-primary mb-4">
          <app-icon [icon]="card.icon" iconSize="3x" />
        </div>
        <h5 class="font-semibold text-base mb-2">{{ card.title }}</h5>
        <p class="text-muted text-sm leading-relaxed">{{ card.description }}</p>
      </div>
    }
  </div>
</div>
