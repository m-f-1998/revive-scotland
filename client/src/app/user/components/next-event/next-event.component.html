@if (validNextEvent) {
  <section class="bg-primary-shade text-white pb-3" id="events">
    <div class="container">
      <div class="row g-4 align-items-center">

        <div class="col-lg-4">
          <span class="badge rounded-pill bg-white text-primary mb-2 px-3 py-2 text-uppercase fw-bold">Up Next</span>
          <div class="mt-4">
            <h2 class="display-5 fw-bold mb-3">{{nextEvent()?.title}}</h2>
            <p class="opacity-75 fs-5 mb-4">
              <app-icon icon="map-marker" class="me-2" />{{nextEvent()?.location}}
            </p>
          </div>

          @if (nextEvent()?.webpageUrl) {
            <a class="btn btn-outline-light btn-lg rounded-pill px-4 transition-all" [href]="nextEvent()?.webpageUrl" target="_blank">
              Get Details <app-icon icon="arrow-right" class="ms-2" />
            </a>
          }
        </div>

        <div class="col-lg-8">
          <div class="countdown-container p-3 p-md-5 rounded-4 bg-white bg-opacity-10 border border-white border-opacity-10 backdrop-blur">
            <div class="d-flex justify-content-center justify-content-md-between text-center align-items-center">

              <div class="timer-segment">
                <div class="timer-num">{{timeRemaining().months}}</div>
                <div class="timer-label">MO</div>
              </div>

              <div class="timer-divider mx-2 mx-md-0">:</div>

              <div class="timer-segment">
                <div class="timer-num">{{timeRemaining().days}}</div>
                <div class="timer-label">DAYS</div>
              </div>

              <div class="timer-divider mx-2 mx-md-0">:</div>

              <div class="timer-segment">
                <div class="timer-num">{{timeRemaining().hours}}</div>
                <div class="timer-label">HRS</div>
              </div>

              <div class="timer-divider mx-2 mx-md-0 d-none d-sm-block">:</div>
              <div class="timer-segment d-none d-sm-block">
                <div class="timer-num">{{timeRemaining().minutes}}</div>
                <div class="timer-label">MIN</div>
              </div>

              <div class="timer-divider mx-2 mx-md-0 d-none d-sm-block">:</div>
              <div class="timer-segment d-none d-sm-block">
                <div class="timer-num text-primary-light">{{timeRemaining().seconds}}</div>
                <div class="timer-label">SEC</div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
}
