<div class="carousel-container">
  @for (img of slides(); track img; let i = $index) {
    <div class="carousel-slide" [class.active]="i === activeSlide()">
      <!-- Blurred backdrop fills letterbox bars -->
      <img
        aria-hidden="true"
        [attr.src]="img.image.startsWith('http') ? img.image : '/api/img/' + img.image + '?w=640&f=webp&q=60'"
        class="carousel-bg"
      />
      <!-- Main image at natural aspect ratio -->
      <img
        [attr.src]="img.image.startsWith('http') ? img.image : '/api/img/' + img.image + '?f=webp&q=92'"
        [attr.srcset]="img.image.startsWith('http') ? '' :
          '/api/img/' + img.image + '?w=640&f=webp&q=92 640w, ' +
          '/api/img/' + img.image + '?w=1280&f=webp&q=92 1280w, ' +
          '/api/img/' + img.image + '?f=webp&q=92 2x'"
        sizes="100vw"
        alt="Revive Scotland Header"
        loading="eager"
        decoding="async"
        class="carousel-img"
      />
      <div class="carousel-caption">
        <h1>{{img.title}}</h1>
        <p class="caption-text text-sm sm:text-base">{{img.content}}</p>
      </div>
    </div>
  }

  @if (slides().length > 1) {
    <div class="carousel-indicators">
      @for (img of slides(); track $index; let i = $index) {
        <button
          class="carousel-indicator-dot"
          [class.active]="i === activeSlide()"
          (click)="goToSlide(i)"
          [attr.aria-label]="'Go to slide ' + (i + 1)"
        ></button>
      }
    </div>
  }
</div>
