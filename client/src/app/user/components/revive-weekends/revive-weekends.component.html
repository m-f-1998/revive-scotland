<div class="grid grid-cols-1 md:grid-cols-2" id="weekends">
  <!-- Video -->
  <div class="secondary-bg border-l border-gray-200 flex items-center justify-center p-4 min-h-[20rem]">
    <video width="640" height="360" controls playsinline class="max-w-full rounded" style="background-color: black; max-height: 600px;">
      <source src="/api/img/kinloss/kinloss-14.mp4" type="video/mp4" />
    </video>
  </div>
  <!-- Content -->
  <div class="flex flex-col p-10 justify-center md:text-right md:order-first">
    <p class="text-serif text-primary mb-0">Sharing our Faith</p>
    <h2 class="uppercase tracking-wider mb-0">{{title}}</h2>
    <div class="md:ml-auto md:max-w-[80%]">
      <p class="text-muted text-sm mt-4 mb-0 leading-relaxed">{{description}}</p>
    </div>
  </div>
</div>
