<div class="grid grid-cols-1 md:grid-cols-2 border-b border-gray-200" id="weekends">
  <div class="flex items-center justify-center p-4 min-h-[20rem]">
    <video width="640" height="360" controls playsinline class="max-w-full rounded" style="max-height: 600px;">
      <source [src]="content().videoUrl" type="video/mp4" />
    </video>
  </div>

  <div class="border-t border-gray-200 md:border-t-0 md:border-r lg:bg-gray-50 dark:lg:bg-slate-800 flex flex-col p-10 justify-center md:text-right md:order-first">
    <p class="text-serif text-primary mb-0">Sharing our Faith</p>
    <h2 class="uppercase tracking-wider mb-0">{{ content().title }}</h2>
    <div class="md:ml-auto md:max-w-[80%]">
      <p class="text-muted text-sm mt-4 mb-0 leading-relaxed whitespace-pre-line">{{ content().description }}</p>
    </div>
  </div>
</div>
