<section class="relative overflow-hidden" id="pilgrimage">
  <img
    [src]="'/api/img/' + content().image + '?w=640&f=webp'"
    [srcset]="
      '/api/img/' + content().image + '?w=320&f=webp 320w,' +
      '/api/img/' + content().image + '?w=640&f=webp 640w,' +
      '/api/img/' + content().image + '?w=1024&f=webp 1024w'
    "
    sizes="(max-width: 600px) 100vw, 600px"
    alt="Pilgrimage background"
    loading="lazy"
    decoding="async"
    class="absolute inset-0 w-full h-full object-cover object-center pointer-events-none select-none"
  />
  <div class="relative z-10 py-24" style="background-color: rgba(88, 64, 57, 0.5);">
    <div class="max-w-screen-md mx-auto px-4 text-center text-white" style="backdrop-filter: blur(5px) saturate(70%);">
      <h2 class="text-4xl sm:text-6xl font-bold mb-6">{{ content().heading }}</h2>
      <p class="text-lg leading-relaxed">{{ content().body }}</p>
    </div>
  </div>
</section>
