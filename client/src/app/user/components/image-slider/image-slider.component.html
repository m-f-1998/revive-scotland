<div class="image-slider">
  <div class="scroll-container">
    <div class="image-track">
      @for ( url of imageURLs(); track $index ) {
        <img [attr.src]="'/api/img/' + url + '?w=640&f=webp'"
          class="img-expand"
          (click)="expandImage($index)"
        />
      }
    </div>

    <div class="sticky-button-row">
      <button class="btn btn-primary" (click)="goToGallery()">
        <app-icon icon="image" />
        View Gallery
      </button>
    </div>
  </div>
</div>
