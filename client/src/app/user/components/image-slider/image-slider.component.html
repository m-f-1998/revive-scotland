<div class="image-slider">
  <div class="scroll-container">
    <div class="image-track">
      @for (url of imageURLs(); track $index) {
        <img [attr.src]="url.startsWith('/') || url.startsWith('http') ? url : '/api/img/' + url + '?w=640&f=webp'"
          [attr.alt]="'Gallery image ' + ($index + 1)"
          class="img-expand"
          loading="lazy"
          (click)="expandImage($index)"
        />
      }
    </div>

    <div class="sticky-button-row">
      <button class="btn-primary w-full" (click)="goToGallery()">
        <app-icon icon="image" />
        View Gallery
      </button>
    </div>
  </div>
</div>
