<div class="min-height-100vh d-flex flex-column">
  <app-navbar />

  <div class="gallery-page container flex-grow-1">
    <div class="toolbar">
      <h2></h2>
      <div class="btn-group">
        <button class="btn btn-primary" [class.active]="filter() === 'dunoon'" (click)="setFilter('dunoon')">Dunoon</button>
        <button class="btn btn-primary" [class.active]="filter() === 'kinloss'" (click)="setFilter('kinloss')">Kinloss</button>
        <button class="btn btn-primary" [class.active]="filter() === 'skye'" (click)="setFilter('skye')">Skye</button>
      </div>
    </div>

    <div class="grid">
      @for ( item of filtered; track $index ) {
        <div class="card" (click)="item.type === 'image' ? openImage($index) : openVideo(item.url)">
          <div class="thumb">
            @if ( item.type === 'image' ) {
              <img #galleryImg [attr.src]="item.lqip" [attr.data-url]="item.url" [attr.data-src]="item.src" [attr.data-srcset]="item.srcset" [attr.sizes]="item.sizes" alt="Gallery image" loading="lazy" class="progressive" />
            } @else {
              <div class="video-thumb">
                <app-icon icon="play-circle" />
                <span>Play video</span>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>

  <app-footer />
</div>
